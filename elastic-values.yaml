COMPUTED VALUES:
affinity: {}
automountServiceAccountToken: true
config:
  caDir: ""
  caRotateBefore: 24h
  caValidity: 8760h
  certificatesRotateBefore: 24h
  certificatesValidity: 8760h
  containerRegistry: docker.elastic.co
  disableConfigWatch: false
  elasticsearchClientTimeout: 180s
  elasticsearchObservationInterval: 10s
  enableLeaderElection: true
  exposedNodeLabels:
  - topology.kubernetes.io/.*
  - failure-domain.beta.kubernetes.io/.*
  ipFamily: ""
  kubeClientTimeout: 60s
  logVerbosity: "0"
  maxConcurrentReconciles: "3"
  metrics:
    port: "0"
    secureMode:
      enabled: false
      tls:
        certificateSecret: ""
  metricsPort: 0
  setDefaultSecurityContext: auto-detect
  ubiOnly: false
  validateStorageClass: true
createClusterScopedResources: true
installCRDs: true
image:
  fips: false
  pullPolicy: IfNotPresent
  repository: docker.elastic.co/eck/eck-operator
  tag: null
resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 150Mi
replicaCount: 1
# --- Add Elasticsearch cluster config here ---
elasticsearch:
  quickstart:
    version: "8.12.0"       # replace with the version you want
    nodeSets:
      - name: default
        count: 3            # 3 nodes
        config:
          node.store.allow_mmap: false
        podTemplate:
          spec:
            containers:
              - name: elasticsearch
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 1
                    memory: 2Gi
        volumeClaimTemplates:
          - metadata:
              name: elasticsearch-data
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi       # PVC size
              storageClassName: gp2  # your cluster storageclass

# --- Kibana config ---
kibana:
  quickstart:
    count: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    elasticsearchRef:
      name: quickstart
dnsConfig: {}
dnsPolicy: ""
eck-operator-crds:
  global:
    createOperatorNamespace: true
    kubeVersion: 1.21.0
    manifestGen: false

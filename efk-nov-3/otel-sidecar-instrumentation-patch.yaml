apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-env-config
  namespace: default
  labels:
    app: otel-instrumentation
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.tracing.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=default"

---

# Apply to all existing microservices

# ------------------ adservice ------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: adservice
        envFrom:
        - configMapRef:
            name: otel-env-config
        env:
        - name: OTEL_SERVICE_NAME
          value: "adservice"

